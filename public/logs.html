<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%8B%3C/text%3E%3C/svg%3E">
<title>訪客紀錄 · IP·UA</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root{
    --bg:#ffffff; --fg:#111111; --muted:#7a7a7a; --sub:#a0a0a0;
    --line:#e6e6e6; --line2:#111111; --card:#ffffff;
    --accent:#111111; --accent-fg:#ffffff; --field:#fafafa;
    color-scheme:light;
  }
  [data-theme="dark"]{
    --bg:#0b0b0b; --fg:#f4f4f4; --muted:#8f8f8f; --sub:#6b6b6b;
    --line:#262626; --line2:#f4f4f4; --card:#131313;
    --accent:#f4f4f4; --accent-fg:#0b0b0b; --field:#181818;
    color-scheme:dark;
  }
  html,body{background:var(--bg);color:var(--fg);}
  body{
    font-family:-apple-system,"Segoe UI","Microsoft JhengHei",system-ui,"PingFang TC",sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;
    padding:26px 16px 56px;transition:background .25s,color .25s;
  }
  .mono{font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,"Courier New",monospace;}
  .wrap{max-width:980px;margin:0 auto;}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:10px;}
  h1{font-size:20px;font-weight:700;letter-spacing:.03em;}
  .ctrls{display:flex;gap:8px;flex:0 0 auto;}
  .ctrl{
    height:38px;min-width:38px;padding:0 13px;border:1px solid var(--line);background:var(--card);
    color:var(--fg);border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;line-height:1;
    font-family:inherit;transition:.15s;display:inline-flex;align-items:center;justify-content:center;
    text-decoration:none;
  }
  .ctrl:hover{border-color:var(--line2);}
  #themeToggle{width:38px;padding:0;font-size:15px;}

  .card{border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin-bottom:14px;background:var(--card);}
  .card-title{
    font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
    color:var(--muted);padding-bottom:9px;margin-bottom:9px;border-bottom:1px solid var(--line);
  }
  .hint{font-size:13px;color:var(--muted);margin-bottom:12px;}
  .error{border:1px solid var(--line2);border-radius:8px;padding:11px 14px;margin-top:12px;font-size:13px;}
  .hidden{display:none!important;}

  .query{display:flex;gap:8px;margin-bottom:14px;}
  input[type=text],input[type=password]{
    flex:1;width:100%;border:1px solid var(--line);background:var(--field);color:var(--fg);
    border-radius:8px;padding:11px 12px;font-size:14px;font-family:inherit;outline:none;transition:.15s;
  }
  input:focus{border-color:var(--line2);}
  button[type=submit]{
    border:1px solid var(--line2);background:var(--accent);color:var(--accent-fg);
    border-radius:8px;padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;
  }
  .ghost{
    border:1px solid var(--line);background:transparent;color:var(--fg);border-radius:8px;
    padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.15s;
  }
  .ghost:hover{border-color:var(--line2);}

  .chips{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .chip{flex:1;min-width:130px;border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:var(--card);}
  .chip b{display:block;font-size:22px;font-weight:700;}
  .chip span{font-size:11px;color:var(--muted);letter-spacing:.05em;}

  .tbl-card{padding:0;overflow:hidden;}
  .tbl-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px;}
  th{text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;
     padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;background:var(--card);}
  td{padding:9px 12px;border-bottom:1px dashed var(--line);vertical-align:top;}
  tbody tr:last-child td{border-bottom:0;}
  tr.main{cursor:pointer;}
  tr.main:hover td{background:var(--field);}
  td.nowrap{white-space:nowrap;}
  .ua-line{max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted);font-size:12px;}
  .ua-name{font-weight:600;}
  tr.detail td{background:var(--field);border-bottom:1px solid var(--line);padding:12px 14px;}
  .kv{display:grid;grid-template-columns:96px 1fr;gap:4px 12px;font-size:12.5px;}
  .kv .k{color:var(--muted);}
  .kv .v{overflow-wrap:anywhere;}
  .empty{padding:22px;text-align:center;color:var(--muted);font-size:13px;}
  .more-row{display:flex;justify-content:center;gap:10px;margin-top:16px;}
  footer{margin-top:28px;text-align:center;color:var(--sub);font-size:11px;line-height:1.8;}
  @media(max-width:480px){h1{font-size:17px;}body{padding:20px 13px 48px;}.chip b{font-size:18px;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>訪客紀錄</h1>
    <div class="ctrls">
      <a class="ctrl" href="/">← 回查詢頁</a>
      <button id="themeToggle" class="ctrl" title="Day / Night">☾</button>
    </div>
  </header>

  <!-- 金鑰輸入（驗證失敗或第一次來會顯示） -->
  <section id="gate" class="card hidden">
    <div class="card-title">站長驗證</div>
    <p class="hint">這一頁只有站長能看。請輸入管理金鑰（LOGS_TOKEN）；金鑰只會存在這台裝置的瀏覽器裡，不會外傳。</p>
    <form id="gateForm" class="query">
      <input id="tokenInput" type="password" autocomplete="off" placeholder="管理金鑰">
      <button type="submit">進入</button>
    </form>
    <div id="gateErr" class="error hidden">⚠ 金鑰不正確，請再試一次。</div>
  </section>

  <!-- 主畫面 -->
  <section id="main" class="hidden">
    <div class="chips">
      <div class="chip"><b id="stToday">—</b><span>今日瀏覽</span></div>
      <div class="chip"><b id="stTodayIps">—</b><span>今日不重複 IP</span></div>
      <div class="chip"><b id="stTotal">—</b><span>累計瀏覽</span></div>
    </div>

    <form id="searchForm" class="query">
      <input id="qInput" type="text" autocomplete="off" placeholder="搜尋 IP / UA / 路徑 / 國家 / ISP…">
      <button type="submit">搜尋</button>
      <button type="button" id="refreshBtn" class="ghost">重新整理</button>
    </form>

    <div class="card tbl-card">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>時間</th><th>IP</th><th>地點</th><th>路徑</th><th>裝置 / 瀏覽器</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div id="empty" class="empty hidden">目前沒有紀錄。</div>
    </div>

    <div class="more-row">
      <button id="moreBtn" class="ghost hidden">載入更多</button>
      <button id="logoutBtn" class="ghost">清除金鑰</button>
    </div>
  </section>

  <footer>每次頁面瀏覽由 Cloudflare Pages Function 寫入 D1 資料庫 · 點一列可展開完整細節</footer>
</div>

<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };

  /* ===== 主題三段式：day 白底（預設）/ night 黑底 / auto 依當地日夜，與主站同儲存鍵 ===== */
  var THEME_MODES = ["day","night","auto"], themeMode = "day", autoCache = null;
  try{ var m0 = localStorage.getItem("ipua-theme-mode"); if(THEME_MODES.indexOf(m0) >= 0) themeMode = m0; }catch(e){}
  try{ autoCache = localStorage.getItem("ipua-auto"); }catch(e){}
  var THEME_TITLE = { day:"白天模式（點擊切換）", night:"夜間模式（點擊切換）", auto:"自動日夜（點擊切換）" };
  function autoThemeGuess(){
    if(autoCache === "light" || autoCache === "dark") return autoCache;
    var h = new Date().getHours(); return (h >= 6 && h < 18) ? "light" : "dark";
  }
  function applyTheme(){
    var th = themeMode === "night" ? "dark" : (themeMode === "auto" ? autoThemeGuess() : "light");
    document.documentElement.setAttribute("data-theme", th);
    var b = $("themeToggle");
    b.textContent = themeMode === "day" ? "☀" : (themeMode === "night" ? "☾" : "🌓");
    b.title = THEME_TITLE[themeMode];
  }
  applyTheme();
  $("themeToggle").addEventListener("click", function(){
    themeMode = THEME_MODES[(THEME_MODES.indexOf(themeMode) + 1) % THEME_MODES.length];
    try{ localStorage.setItem("ipua-theme-mode", themeMode); }catch(e){}
    applyTheme();
  });

  /* ===== 狀態 ===== */
  var LIMIT = 50;
  var token = "";
  try{ token = localStorage.getItem("ipua-logs-token") || ""; }catch(e){}
  var offset = 0, q = "", loading = false;

  /* ===== 小工具 ===== */
  function el(tag, cls, text){
    var n = document.createElement(tag);
    if(cls) n.className = cls;
    if(text !== undefined && text !== null) n.textContent = text;
    return n;
  }
  function fmtTime(iso){
    var d = new Date(iso);
    if(isNaN(d)) return iso || "—";
    var now = new Date();
    var opt = { month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false };
    if(d.getFullYear() !== now.getFullYear()) opt.year = "numeric";
    return d.toLocaleString("zh-TW", opt);
  }
  function countryName(code){
    if(!code) return "";
    try{
      if(window.Intl && Intl.DisplayNames){
        var n = new Intl.DisplayNames(["zh-Hant"], { type:"region" }).of(code);
        if(n && n !== code) return n + " (" + code + ")";
      }
    }catch(e){}
    return code;
  }
  // 迷你 UA 解析：列表顯示「Chrome 138 · Windows」這種摘要，完整字串在展開列
  function uaBrief(ua){
    if(!ua) return "—";
    var m, name = "", os = "";
    if((m = ua.match(/Edg(?:e|A|iOS)?\/([\d.]+)/)))      name = "Edge " + m[1].split(".")[0];
    else if((m = ua.match(/OPR\/([\d.]+)/)))             name = "Opera " + m[1].split(".")[0];
    else if((m = ua.match(/SamsungBrowser\/([\d.]+)/)))  name = "Samsung " + m[1].split(".")[0];
    else if((m = ua.match(/CriOS\/([\d.]+)/)))           name = "Chrome iOS " + m[1].split(".")[0];
    else if((m = ua.match(/FxiOS\/([\d.]+)/)))           name = "Firefox iOS " + m[1].split(".")[0];
    else if((m = ua.match(/Firefox\/([\d.]+)/)))         name = "Firefox " + m[1].split(".")[0];
    else if((m = ua.match(/Chrome\/([\d.]+)/)))          name = "Chrome " + m[1].split(".")[0];
    else if((m = ua.match(/Version\/([\d.]+).*Safari/))) name = "Safari " + m[1].split(".")[0];
    else if(/bot|crawl|spider|preview|fetch|curl|wget|python|http/i.test(ua)) name = "Bot / 工具";
    if(/Windows NT 10\.0/.test(ua)) os = "Windows";
    else if(/Windows/.test(ua))     os = "Windows";
    else if(/Android/.test(ua))     os = "Android";
    else if(/iPhone|iPad|iPod/.test(ua)) os = "iOS";
    else if(/Mac OS X/.test(ua))    os = "macOS";
    else if(/Linux/.test(ua))       os = "Linux";
    if(!name && !os) return "";
    return name + (name && os ? " · " : "") + os;
  }
  function sinceToday(){
    var d = new Date(); d.setHours(0,0,0,0);   // 本地（台灣）今天零點 → 轉成 UTC ISO 給伺服器比對
    return d.toISOString();
  }

  /* ===== API ===== */
  function api(params){
    var qs = "limit=" + LIMIT + "&offset=" + params.offset +
             "&since=" + encodeURIComponent(sinceToday()) +
             (params.q ? "&q=" + encodeURIComponent(params.q) : "");
    var headers = token ? { "Authorization": "Bearer " + token } : {};
    return fetch("/api/logs?" + qs, { headers: headers, cache: "no-store" })
      .then(function(r){
        if(r.status === 401) throw { auth: true };
        if(!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      });
  }

  /* ===== 畫面 ===== */
  function showGate(withErr){
    $("gate").classList.remove("hidden");
    $("main").classList.add("hidden");
    $("gateErr").classList.toggle("hidden", !withErr);
    $("tokenInput").focus();
  }
  function showMain(){
    $("gate").classList.add("hidden");
    $("main").classList.remove("hidden");
  }

  var DETAIL_FIELDS = [
    ["完整 UA", function(r){ return r.ua; }],
    ["ISP", function(r){ return (r.isp || "") + (r.asn ? " (AS" + r.asn + ")" : ""); }],
    ["地區", function(r){ return [r.city, r.region, countryName(r.country)].filter(Boolean).join(" · "); }],
    ["語言標頭", function(r){ return r.lang; }],
    ["來源頁", function(r){ return r.referer; }],
    ["CF 節點", function(r){ return r.colo; }],
    ["連線", function(r){ return [r.http, r.tls].filter(Boolean).join(" · "); }],
    ["主機", function(r){ return r.host; }],
    ["方法", function(r){ return r.method; }],
    ["編號", function(r){ return "#" + r.id; }]
  ];

  function renderRow(r){
    var tr = el("tr", "main");
    var tdT = el("td", "nowrap mono", fmtTime(r.ts)); tdT.title = r.ts;
    tr.appendChild(tdT);
    tr.appendChild(el("td", "mono", r.ip || "—"));
    var geo = [r.country || "", r.city || ""].filter(Boolean).join(" · ");
    tr.appendChild(el("td", "nowrap", geo || "—"));
    tr.appendChild(el("td", "mono", r.path || "—"));
    var tdU = el("td");
    var brief = uaBrief(r.ua);
    if(brief) tdU.appendChild(el("div", "ua-name", brief));
    var line = el("div", "ua-line mono", r.ua || "—"); line.title = r.ua || "";
    tdU.appendChild(line);
    tr.appendChild(tdU);

    var detail = null;
    tr.addEventListener("click", function(){
      if(detail){ detail.remove(); detail = null; return; }
      detail = el("tr", "detail");
      var td = document.createElement("td"); td.colSpan = 5;
      var kv = el("div", "kv");
      DETAIL_FIELDS.forEach(function(f){
        var v = f[1](r);
        if(v === undefined || v === null || v === "") return;
        kv.appendChild(el("span", "k", f[0]));
        kv.appendChild(el("span", "v mono", String(v)));
      });
      td.appendChild(kv); detail.appendChild(td);
      tr.parentNode.insertBefore(detail, tr.nextSibling);
    });
    return tr;
  }

  function load(reset){
    if(loading) return;
    loading = true;
    if(reset){ offset = 0; }
    api({ offset: offset, q: q }).then(function(d){
      if(reset) $("tbody").innerHTML = "";
      (d.rows || []).forEach(function(r){ $("tbody").appendChild(renderRow(r)); });
      offset += (d.rows || []).length;
      $("stTotal").textContent = (d.total != null) ? d.total.toLocaleString() : "—";
      $("stToday").textContent = (d.today != null) ? d.today.toLocaleString() : "—";
      $("stTodayIps").textContent = (d.todayIps != null) ? d.todayIps.toLocaleString() : "—";
      $("empty").classList.toggle("hidden", $("tbody").children.length > 0);
      $("moreBtn").classList.toggle("hidden", offset >= d.total || (d.rows || []).length < LIMIT);
      showMain();
      try{ if(token) localStorage.setItem("ipua-logs-token", token); }catch(e){}
      loading = false;
    }).catch(function(err){
      loading = false;
      if(err && err.auth){ showGate(!!token); return; }
      $("empty").textContent = "讀取失敗，請稍後再試。";
      $("empty").classList.remove("hidden");
      showMain();
    });
  }

  /* ===== 綁定 ===== */
  $("gateForm").addEventListener("submit", function(e){
    e.preventDefault();
    token = $("tokenInput").value.trim();
    if(token) load(true);
  });
  $("searchForm").addEventListener("submit", function(e){
    e.preventDefault();
    q = $("qInput").value.trim();
    load(true);
  });
  $("refreshBtn").addEventListener("click", function(){ load(true); });
  $("moreBtn").addEventListener("click", function(){ load(false); });
  $("logoutBtn").addEventListener("click", function(){
    token = "";
    try{ localStorage.removeItem("ipua-logs-token"); }catch(e){}
    showGate(false);
  });

  load(true);   // 有存過金鑰就直接進；沒有或錯誤 → 顯示驗證畫面
})();
</script>
</body>
</html>
