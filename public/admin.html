<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%8F%EF%B8%8F%3C/text%3E%3C/svg%3E">
<title>文章管理 · uaip.cc.cd</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root{
    --bg:#ffffff; --fg:#111111; --muted:#7a7a7a; --sub:#a0a0a0;
    --line:#e6e6e6; --line2:#111111; --card:#ffffff;
    --accent:#111111; --accent-fg:#ffffff; --field:#fafafa;
    color-scheme:light;
  }
  [data-theme="dark"]{
    --bg:#0b0b0b; --fg:#f4f4f4; --muted:#8f8f8f; --sub:#6b6b6b;
    --line:#262626; --line2:#f4f4f4; --card:#131313;
    --accent:#f4f4f4; --accent-fg:#0b0b0b; --field:#181818;
    color-scheme:dark;
  }
  html,body{background:var(--bg);color:var(--fg);}
  body{
    font-family:-apple-system,"Segoe UI","Microsoft JhengHei",system-ui,"PingFang TC",sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;
    padding:26px 16px 56px;transition:background .25s,color .25s;
  }
  .mono{font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,"Courier New",monospace;}
  .wrap{max-width:860px;margin:0 auto;}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:10px;}
  h1{font-size:20px;font-weight:700;letter-spacing:.03em;}
  .ctrls{display:flex;gap:8px;flex:0 0 auto;}
  .ctrl{
    height:38px;min-width:38px;padding:0 13px;border:1px solid var(--line);background:var(--card);
    color:var(--fg);border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;line-height:1;
    font-family:inherit;transition:.15s;display:inline-flex;align-items:center;justify-content:center;
    text-decoration:none;
  }
  .ctrl:hover{border-color:var(--line2);}
  #themeToggle{width:38px;padding:0;font-size:15px;}

  .card{border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin-bottom:14px;background:var(--card);}
  .card-title{
    font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
    color:var(--muted);padding-bottom:9px;margin-bottom:9px;border-bottom:1px solid var(--line);
  }
  .hint{font-size:12.5px;color:var(--muted);margin:4px 0 10px;}
  .error{border:1px solid var(--line2);border-radius:8px;padding:11px 14px;margin-top:12px;font-size:13px;}
  .hidden{display:none!important;}

  .query{display:flex;gap:8px;margin-bottom:14px;}
  input[type=text],input[type=password],select,textarea{
    width:100%;border:1px solid var(--line);background:var(--field);color:var(--fg);
    border-radius:8px;padding:11px 12px;font-size:14px;font-family:inherit;outline:none;transition:.15s;
  }
  .query input{flex:1;}
  input:focus,select:focus,textarea:focus{border-color:var(--line2);}
  textarea{resize:vertical;line-height:1.7;}
  #fBody{min-height:320px;font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-size:13.5px;}
  button[type=submit],.primary{
    border:1px solid var(--line2);background:var(--accent);color:var(--accent-fg);
    border-radius:8px;padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;
  }
  .ghost{
    border:1px solid var(--line);background:transparent;color:var(--fg);border-radius:8px;
    padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.15s;
    text-decoration:none;display:inline-flex;align-items:center;gap:6px;
  }
  .ghost:hover{border-color:var(--line2);}
  .danger:hover{border-color:#c33;color:#c33;}
  button:disabled{opacity:.5;cursor:default;}

  .toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
  .toolbar .sp{flex:1;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.06em;margin-bottom:6px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:560px){.grid2{grid-template-columns:1fr;}}

  .chip{display:inline-block;font-size:11px;font-weight:700;border-radius:20px;padding:2px 10px;border:1px solid var(--line);color:var(--muted);vertical-align:1px;}
  .chip.pub{background:var(--accent);color:var(--accent-fg);border-color:var(--line2);}

  .tbl-card{padding:0;overflow:hidden;}
  .tbl-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px;}
  th{text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;
     padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;background:var(--card);}
  td{padding:10px 12px;border-bottom:1px dashed var(--line);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:0;}
  tbody tr{cursor:pointer;}
  tbody tr:hover td{background:var(--field);}
  td.nowrap{white-space:nowrap;}
  .t-title{font-weight:600;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .empty{padding:22px;text-align:center;color:var(--muted);font-size:13px;}

  .coverbox{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;}
  .coverbox .cin{flex:1;min-width:200px;}
  #coverPrev{width:150px;aspect-ratio:5/3;object-fit:cover;border-radius:8px;border:1px solid var(--line);display:block;}
  #msg{font-size:13px;color:var(--muted);}

  /* 內文預覽（樣式與正式文章頁一致，寫的時候看到什麼上線就是什麼） */
  .prose{font-size:15.5px;line-height:1.95;overflow-wrap:anywhere;padding:4px 2px;}
  .prose p{margin:0 0 1.1em;}
  .prose h2{font-size:19px;line-height:1.5;margin:1.5em 0 .65em;}
  .prose h3{font-size:17px;margin:1.3em 0 .55em;}
  .prose img{max-width:100%;height:auto;border-radius:10px;display:block;margin:16px auto;}
  .prose a{color:var(--fg);}
  .prose ul,.prose ol{padding-left:1.7em;margin:0 0 1.1em;}
  .prose blockquote{border-left:3px solid var(--line2);padding:2px 0 2px 14px;color:var(--muted);margin:0 0 1.1em;}
  .prose code{font-family:ui-monospace,Menlo,Consolas,monospace;background:var(--field);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:.88em;}
  .prose pre{background:var(--field);border:1px solid var(--line);border-radius:10px;padding:14px;overflow-x:auto;margin:0 0 1.1em;}
  .prose pre code{border:0;background:none;padding:0;}
  .prose table{border-collapse:collapse;margin:0 0 1.1em;max-width:100%;display:block;overflow-x:auto;}
  .prose th,.prose td{border:1px solid var(--line);padding:6px 12px;}

  footer{margin-top:28px;text-align:center;color:var(--sub);font-size:11px;line-height:1.8;}
  @media(max-width:480px){h1{font-size:17px;}body{padding:20px 13px 48px;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>文章管理</h1>
    <div class="ctrls">
      <a class="ctrl" href="/news">← 回網站</a>
      <button id="themeToggle" class="ctrl" title="Day / Night">☾</button>
    </div>
  </header>

  <!-- 金鑰驗證（與 /logs 同一把管理金鑰） -->
  <section id="gate" class="card hidden">
    <div class="card-title">站長驗證</div>
    <p class="hint">這一頁只有站長能用。請輸入管理金鑰（與訪客紀錄相同那一把）；金鑰只存在這台裝置的瀏覽器裡。</p>
    <form id="gateForm" class="query">
      <input id="tokenInput" type="password" autocomplete="off" placeholder="管理金鑰">
      <button type="submit">進入</button>
    </form>
    <div id="gateErr" class="error hidden">⚠ 金鑰不正確，請再試一次。</div>
  </section>

  <!-- 文章列表 -->
  <section id="listView" class="hidden">
    <div class="toolbar">
      <button id="newBtn" class="primary" type="button">＋ 新增文章</button>
      <button id="reloadBtn" class="ghost" type="button">重新整理</button>
      <span class="sp"></span>
      <button id="logoutBtn" class="ghost" type="button">清除金鑰</button>
    </div>
    <div class="card tbl-card">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>標題</th><th>分類</th><th>狀態</th><th>瀏覽</th><th>發佈時間</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div id="listEmpty" class="empty hidden">還沒有任何文章 — 按「＋ 新增文章」開始寫第一篇。</div>
    </div>
  </section>

  <!-- 編輯器 -->
  <section id="editView" class="hidden">
    <div class="toolbar">
      <button id="backBtn" class="ghost" type="button">← 回列表</button>
      <span id="editState" class="hint" style="margin:0"></span>
      <span class="sp"></span>
      <a id="viewLink" class="ghost hidden" target="_blank" rel="noopener">檢視 ↗</a>
    </div>

    <div class="card">
      <div class="grid2">
        <div class="field">
          <label for="fCat">分類</label>
          <select id="fCat">
            <option value="news">新聞</option>
            <option value="article">文章</option>
          </select>
        </div>
        <div class="field">
          <label for="fTitle">標題（必填）</label>
          <input id="fTitle" type="text" autocomplete="off" placeholder="文章標題">
        </div>
      </div>

      <div class="field">
        <label for="fSummary">摘要</label>
        <textarea id="fSummary" rows="2" placeholder="一兩句話簡介 — 顯示在列表標題下方，也是 Google 搜尋結果與分享卡片的描述文字"></textarea>
      </div>

      <div class="field">
        <label>縮圖（列表與分享預覽用，建議橫式）</label>
        <div class="coverbox">
          <img id="coverPrev" class="hidden" alt="縮圖預覽">
          <div class="cin">
            <input id="fCover" type="text" autocomplete="off" placeholder="上傳後自動填入，也可以直接貼圖片網址">
            <div class="toolbar" style="margin:10px 0 0">
              <button id="coverBtn" class="ghost" type="button">上傳縮圖</button>
              <button id="coverClear" class="ghost" type="button">清除</button>
            </div>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="fBody">內文（Markdown：空一行分段、<span class="mono">## 標題</span>、<span class="mono">**粗體**</span>、<span class="mono">[文字](網址)</span>）</label>
        <div class="toolbar" style="margin-bottom:10px">
          <button id="imgBtn" class="ghost" type="button">插入圖片</button>
          <span id="upMsg" class="hint" style="margin:0"></span>
        </div>
        <textarea id="fBody" spellcheck="false" placeholder="在這裡寫內文…"></textarea>
      </div>
    </div>

    <div class="card">
      <div class="card-title">預覽（與正式頁面同樣式）</div>
      <div id="pv" class="prose"><p class="hint">開始輸入內文後這裡會即時預覽。</p></div>
    </div>

    <div class="toolbar">
      <button id="saveBtn" class="primary" type="button">儲存草稿</button>
      <button id="pubBtn" class="ghost" type="button">發佈</button>
      <span id="msg"></span>
      <span class="sp"></span>
      <button id="delBtn" class="ghost danger hidden" type="button">刪除</button>
    </div>
  </section>

  <footer>文章與圖片存於 D1 資料庫 · 發佈後立即出現在 /news 或 /articles · 圖片上傳前會自動壓縮</footer>
</div>

<script src="/assets/marked.js"></script>
<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };

  /* ===== 主題三段式：day 白底（預設）/ night 黑底 / auto 依當地日夜，與主站同儲存鍵 ===== */
  var THEME_MODES = ["day","night","auto"], themeMode = "day", autoCache = null;
  try{ var m0 = localStorage.getItem("ipua-theme-mode"); if(THEME_MODES.indexOf(m0) >= 0) themeMode = m0; }catch(e){}
  try{ autoCache = localStorage.getItem("ipua-auto"); }catch(e){}
  var THEME_TITLE = { day:"白天模式（點擊切換）", night:"夜間模式（點擊切換）", auto:"自動日夜（點擊切換）" };
  function autoThemeGuess(){
    if(autoCache === "light" || autoCache === "dark") return autoCache;
    var h = new Date().getHours(); return (h >= 6 && h < 18) ? "light" : "dark";
  }
  function applyTheme(){
    var th = themeMode === "night" ? "dark" : (themeMode === "auto" ? autoThemeGuess() : "light");
    document.documentElement.setAttribute("data-theme", th);
    var b = $("themeToggle");
    b.textContent = themeMode === "day" ? "☀" : (themeMode === "night" ? "☾" : "🌓");
    b.title = THEME_TITLE[themeMode];
  }
  applyTheme();
  $("themeToggle").addEventListener("click", function(){
    themeMode = THEME_MODES[(THEME_MODES.indexOf(themeMode) + 1) % THEME_MODES.length];
    try{ localStorage.setItem("ipua-theme-mode", themeMode); }catch(e){}
    applyTheme();
  });

  /* ===== 狀態 ===== */
  var token = "";
  try{ token = localStorage.getItem("ipua-logs-token") || ""; }catch(e){}
  // cur = 目前編輯中的文章；id 為 null 代表新文章還沒存過
  var cur = null;
  var MD_OPTS = { gfm:true, breaks:true, async:false };
  var CAT_PATH = { news:"/news", article:"/articles" };
  var CAT_LABEL = { news:"新聞", article:"文章" };

  /* ===== API ===== */
  function api(path, opts){
    opts = opts || {};
    opts.headers = opts.headers || {};
    if(token) opts.headers["Authorization"] = "Bearer " + token;
    if(opts.json !== undefined){
      opts.method = opts.method || "POST";
      opts.headers["content-type"] = "application/json";
      opts.body = JSON.stringify(opts.json);
      delete opts.json;
    }
    return fetch(path, opts).then(function(r){
      if(r.status === 401) throw { auth:true };
      return r.json().catch(function(){ return {}; }).then(function(d){
        if(!r.ok) throw new Error(d.hint || d.error || ("HTTP " + r.status));
        // 驗證通過就把金鑰記在這台裝置（含 ?edit= 直達的情況），下次免輸入
        try{ if(token) localStorage.setItem("ipua-logs-token", token); }catch(e){}
        return d;
      });
    });
  }

  /* ===== 畫面切換 ===== */
  function show(view, withErr){
    $("gate").classList.toggle("hidden", view !== "gate");
    $("listView").classList.toggle("hidden", view !== "list");
    $("editView").classList.toggle("hidden", view !== "edit");
    if(view === "gate"){
      $("gateErr").classList.toggle("hidden", !withErr);
      $("tokenInput").focus();
    }
  }

  /* ===== 列表 ===== */
  function fmtTime(iso){
    if(!iso) return "—";
    var d = new Date(iso);
    if(isNaN(d)) return iso;
    return d.toLocaleString("zh-TW", { month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit", hour12:false });
  }
  function el(tag, cls, text){
    var n = document.createElement(tag);
    if(cls) n.className = cls;
    if(text !== undefined && text !== null) n.textContent = text;
    return n;
  }
  function loadList(){
    api("/api/admin/articles").then(function(d){
      // 回到列表＝離開直達模式，把網址上的 ?edit= / ?new= 清掉（重新整理不會又跳回編輯器）
      try{ if(location.search) history.replaceState({}, "", "/admin"); }catch(e){}
      var tb = $("tbody"); tb.innerHTML = "";
      (d.rows || []).forEach(function(r){
        var tr = el("tr");
        var tdT = el("td"); tdT.appendChild(el("div", "t-title", r.title)); tr.appendChild(tdT);
        tr.appendChild(el("td", "nowrap", CAT_LABEL[r.category] || r.category));
        var tdS = el("td", "nowrap");
        tdS.appendChild(el("span", "chip" + (r.status === "published" ? " pub" : ""), r.status === "published" ? "已發佈" : "草稿"));
        tr.appendChild(tdS);
        tr.appendChild(el("td", "nowrap", String(r.views || 0)));
        tr.appendChild(el("td", "nowrap", fmtTime(r.published_at)));
        tr.addEventListener("click", function(){ openEdit(r.id); });
        tb.appendChild(tr);
      });
      $("listEmpty").classList.toggle("hidden", (d.rows || []).length > 0);
      show("list");
    }).catch(function(err){
      if(err && err.auth) show("gate", !!token);
      else alert("讀取失敗：" + (err.message || err));
    });
  }

  /* ===== 編輯器 ===== */
  function fillEditor(row){
    cur = row;
    $("fCat").value = row.category || "news";
    $("fTitle").value = row.title || "";
    $("fSummary").value = row.summary || "";
    $("fCover").value = row.cover || "";
    $("fBody").value = row.body_md || "";
    updateCover();
    renderPreview();
    updateButtons();
    $("msg").textContent = "";
    $("upMsg").textContent = "";
    show("edit");
    if(!row.id) $("fTitle").focus();
  }
  function openNew(cat){
    fillEditor({ id:null, category: cat === "article" ? "article" : "news", status:"draft", views:0 });
  }
  function openEdit(id){
    api("/api/admin/articles/" + id).then(function(d){ fillEditor(d.row); })
      .catch(function(err){
        if(err && err.auth) show("gate", true);
        else alert("讀取失敗：" + (err.message || err));
      });
  }
  function updateButtons(){
    var pub = cur.status === "published";
    $("editState").textContent = (cur.id ? "＃" + cur.id + " · " : "新文章 · ") + (pub ? "已發佈" : "草稿");
    $("saveBtn").textContent = pub ? "儲存變更" : "儲存草稿";
    $("pubBtn").textContent = pub ? "轉回草稿" : "發佈";
    $("delBtn").classList.toggle("hidden", !cur.id);
    var vl = $("viewLink");
    if(cur.id && pub){
      vl.href = (CAT_PATH[cur.category] || "/news") + "/" + cur.id;
      vl.classList.remove("hidden");
    } else vl.classList.add("hidden");
  }
  function collect(status){
    return {
      category: $("fCat").value === "article" ? "article" : "news",
      title: $("fTitle").value.trim(),
      summary: $("fSummary").value.trim(),
      cover: $("fCover").value.trim(),
      body_md: $("fBody").value,
      status: status
    };
  }
  function save(status){
    var data = collect(status);
    if(!data.title){ alert("標題不能是空的"); $("fTitle").focus(); return; }
    $("saveBtn").disabled = $("pubBtn").disabled = true;
    var req = cur.id
      ? api("/api/admin/articles/" + cur.id, { method:"PUT", json:data })
      : api("/api/admin/articles", { method:"POST", json:data });
    req.then(function(d){
      cur.id = cur.id || d.id;
      cur.status = data.status;
      cur.category = data.category;
      updateButtons();
      $("msg").textContent = data.status === "published" ? "✓ 已發佈" : "✓ 已儲存";
      setTimeout(function(){ $("msg").textContent = ""; }, 2500);
    }).catch(function(err){
      if(err && err.auth) show("gate", true);
      else alert("儲存失敗：" + (err.message || err));
    }).finally(function(){
      $("saveBtn").disabled = $("pubBtn").disabled = false;
    });
  }

  /* ===== 預覽 ===== */
  var pvTimer = null;
  function renderPreview(){
    var v = $("fBody").value;
    $("pv").innerHTML = v.trim() ? marked.parse(v, MD_OPTS) : '<p class="hint">開始輸入內文後這裡會即時預覽。</p>';
  }
  $("fBody").addEventListener("input", function(){
    clearTimeout(pvTimer);
    pvTimer = setTimeout(renderPreview, 250);
  });

  /* ===== 圖片：瀏覽器端壓縮 → 上傳 ===== */
  var MAX_UP = 1800000;   // 與伺服器一致（D1 單值上限 2MB，保守收 1.8MB）
  function compressImage(file){
    return new Promise(function(resolve, reject){
      if(!/^image\//.test(file.type)) return reject(new Error("請選擇圖片檔"));
      // GIF 重壓會失去動畫：小於上限就原樣上傳
      if(file.type === "image/gif" && file.size <= MAX_UP) return resolve({ blob:file, w:0, h:0 });
      var url = URL.createObjectURL(file), img = new Image();
      img.onload = function(){
        var MAXW = 1600, w = img.naturalWidth, h = img.naturalHeight;
        var s = Math.min(1, MAXW / w);
        var cw = Math.max(1, Math.round(w * s)), ch = Math.max(1, Math.round(h * s));
        var cv = document.createElement("canvas"); cv.width = cw; cv.height = ch;
        cv.getContext("2d").drawImage(img, 0, 0, cw, ch);
        URL.revokeObjectURL(url);
        var attempt = function(type, q, next){
          cv.toBlob(function(b){
            if(b && b.size <= MAX_UP) return resolve({ blob:b, w:cw, h:ch });
            next();
          }, type, q);
        };
        // webp 0.82 → webp 0.6 → jpeg 0.8 → 縮到 1000px jpeg 0.7 → 放棄
        attempt("image/webp", 0.82, function(){
          attempt("image/webp", 0.6, function(){
            attempt("image/jpeg", 0.8, function(){
              var s2 = Math.min(1, 1000 / cw);
              var c2 = document.createElement("canvas");
              c2.width = Math.max(1, Math.round(cw * s2)); c2.height = Math.max(1, Math.round(ch * s2));
              c2.getContext("2d").drawImage(cv, 0, 0, c2.width, c2.height);
              c2.toBlob(function(b2){
                if(b2 && b2.size <= MAX_UP) resolve({ blob:b2, w:c2.width, h:c2.height });
                else reject(new Error("這張圖壓不進 1.8MB，請換一張"));
              }, "image/jpeg", 0.7);
            });
          });
        });
      };
      img.onerror = function(){ URL.revokeObjectURL(url); reject(new Error("圖片無法讀取")); };
      img.src = url;
    });
  }
  function upload(file, onDone){
    $("upMsg").textContent = "壓縮中…";
    compressImage(file).then(function(r){
      $("upMsg").textContent = "上傳中…（" + Math.round(r.blob.size / 1024) + " KB）";
      var headers = { "content-type": r.blob.type || "image/webp" };
      if(token) headers["Authorization"] = "Bearer " + token;
      return fetch("/api/admin/media?w=" + r.w + "&h=" + r.h, { method:"POST", headers:headers, body:r.blob })
        .then(function(resp){
          if(resp.status === 401) throw { auth:true };
          return resp.json().then(function(d){
            if(!resp.ok) throw new Error(d.hint || d.error || ("HTTP " + resp.status));
            return d;
          });
        });
    }).then(function(d){
      $("upMsg").textContent = "✓ 已上傳";
      setTimeout(function(){ $("upMsg").textContent = ""; }, 2000);
      onDone(d);
    }).catch(function(err){
      $("upMsg").textContent = "";
      if(err && err.auth) show("gate", true);
      else alert("上傳失敗：" + (err.message || err));
    });
  }
  function pickFile(onPick){
    var inp = document.createElement("input");
    inp.type = "file"; inp.accept = "image/*";
    inp.addEventListener("change", function(){ if(inp.files && inp.files[0]) onPick(inp.files[0]); });
    inp.click();
  }
  function updateCover(){
    var v = $("fCover").value.trim();
    $("coverPrev").classList.toggle("hidden", !v);
    if(v) $("coverPrev").src = v;
  }
  function insertAtCursor(ta, text){
    var s = ta.selectionStart || 0, e = ta.selectionEnd || 0, v = ta.value;
    ta.value = v.slice(0, s) + text + v.slice(e);
    ta.selectionStart = ta.selectionEnd = s + text.length;
    renderPreview();
    ta.focus();
  }

  /* ===== 綁定 ===== */
  $("gateForm").addEventListener("submit", function(e){
    e.preventDefault();
    token = $("tokenInput").value.trim();
    if(token) boot();   // 金鑰對了會回到原本要去的地方（含 ?edit= / ?new= 直達）
  });
  $("newBtn").addEventListener("click", function(){ openNew(); });
  $("reloadBtn").addEventListener("click", loadList);
  $("logoutBtn").addEventListener("click", function(){
    token = "";
    try{ localStorage.removeItem("ipua-logs-token"); }catch(e){}
    show("gate", false);
  });
  $("backBtn").addEventListener("click", loadList);
  $("saveBtn").addEventListener("click", function(){ save(cur.status); });
  $("pubBtn").addEventListener("click", function(){ save(cur.status === "published" ? "draft" : "published"); });
  $("delBtn").addEventListener("click", function(){
    if(!cur.id) return;
    if(!confirm("確定要刪除「" + ($("fTitle").value || "未命名") + "」嗎？刪了就找不回來。")) return;
    api("/api/admin/articles/" + cur.id, { method:"DELETE" }).then(loadList).catch(function(err){
      if(err && err.auth) show("gate", true);
      else alert("刪除失敗：" + (err.message || err));
    });
  });
  $("fCover").addEventListener("input", updateCover);
  $("coverBtn").addEventListener("click", function(){
    pickFile(function(f){ upload(f, function(d){ $("fCover").value = d.url; updateCover(); }); });
  });
  $("coverClear").addEventListener("click", function(){ $("fCover").value = ""; updateCover(); });
  $("imgBtn").addEventListener("click", function(){
    pickFile(function(f){
      upload(f, function(d){ insertAtCursor($("fBody"), "\n![圖片說明](" + d.url + ")\n"); });
    });
  });

  // 網址直達（✎ 編輯模式用）：/admin?edit=12 直接開該篇編輯器、/admin?new=article 直接寫新文章；
  // 沒帶參數＝照舊進列表。金鑰不對會先出現驗證畫面，過了再繼續。
  function boot(){
    var q = location.search || "";
    var em = q.match(/[?&]edit=(\d+)/);
    var nm = q.match(/[?&]new=(news|article)/);
    if(em) openEdit(parseInt(em[1], 10));
    else if(nm) openNew(nm[1]);
    else loadList();
  }
  boot();
})();
</script>
</body>
</html>
