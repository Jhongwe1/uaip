  # ===== Auth =====
  /auth/login:
    get:
      tags: [Auth]
      summary: 轉向 Google OAuth（本機 dev 顯示測試登入表單）
      parameters: [{ name: next, in: query, schema: { type: string } }]
      responses:
        "302": { description: 轉向 Google }
    post:
      tags: [Auth]
      summary: 本機 dev 測試登入（僅 localhost）
      responses:
        "302": { description: 登入後轉向 }
  /auth/logout:
    get:
      tags: [Auth]
      summary: 登出（清 session）
      responses:
        "302": { description: 轉向首頁 }
    post:
      tags: [Auth]
      summary: 登出（POST 版，過 Origin 檢查）
      responses:
        "302": { description: 轉向首頁 }
  /auth/callback:
    get:
      tags: [Auth]
      summary: Google OAuth 回呼（驗 state／aud／email_verified）
      responses:
        "302": { description: 建 session 後轉向 }

  # ===== 中轉與 VPN =====
  /relay:
    get:
      tags: [中轉與VPN]
      summary: /relay 操作頁（會員：金鑰管理；管理員：渠道管理）—實際接受所有方法
      responses:
        "200": { $ref: "#/components/responses/HtmlPage" }
  /relay/{path}:
    post:
      tags: [中轉與VPN]
      summary: API 中轉轉發（/relay/{渠道slug}/{上游路徑}；帶 uak- 會員金鑰；接受所有方法）
      description: 伺服器把驗證換成管理員存的上游金鑰後轉發；串流照走；計量只掃回應尾端。
      security: [{ memberKey: [] }]
      parameters:
        [
          {
            name: path,
            in: path,
            required: true,
            schema: { type: string },
            description: 渠道 slug＋上游路徑（catch-all）
          }
        ]
      responses:
        "200": { description: 上游回應（原樣轉發） }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { description: 配額或限流 }
    get:
      tags: [中轉與VPN]
      summary: 同上（GET 轉發）
      security: [{ memberKey: [] }]
      parameters: [{ name: path, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: 上游回應 }
  /vpn:
    get:
      tags: [中轉與VPN]
      summary: VPN 訂閱頁（無 vpn 權限者隱形＝回 SPA 殼）
      responses:
        "200": { $ref: "#/components/responses/HtmlPage" }
  /vpn/sub/{token}:
    get:
      tags: [中轉與VPN]
      summary: 會員訂閱網址（多渠道合併去重；token 可重生）
      parameters: [{ name: token, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: base64 節點清單 }
        "404": { description: token 無效（回 SPA 殼，隱形） }

  # ===== HTML 頁面 =====
