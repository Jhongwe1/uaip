# CI — 只跑檢查與測試（管理員拍板：部署照舊在本機跑 npm run deploy，CI 不碰部署）。
# 綠燈 ＝ lint 過、Prettier 無漂移、typecheck 過、全部測試過、apidoc 與 CSP hash 沒漂移、無外洩秘密。
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier 無漂移
        run: npm run format:check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      # src/lib/apidoc.ts 是從 API.md 產生的 — 忘了重跑 apidoc 就 commit 會在這裡被抓到
      - name: apidoc 防漂移
        run: |
          npm run apidoc
          git diff --exit-code src/lib/apidoc.ts
      # src/lib/openapi.ts 是從 docs/openapi.yaml 產生的（Phase L 三件套之三）
      - name: openapi 防漂移
        run: |
          npm run openapi
          git diff --exit-code src/lib/openapi.ts
      # 靜態 CSP hash：index.html 的 inline script 改了、_headers 忘了跟上 → 紅燈
      - name: CSP hash 防漂移
        run: node tools/check-csp.mjs

  # E2E（Playwright，Phase M）：真瀏覽器×wrangler dev×mock 上游，只跑 chromium。
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  # 秘密外洩掃描（gitleaks）：擋住把金鑰／token commit 進 repo。
  # 公開前的硬性防線之一（另有 Phase O 的 filter-repo 洗歷史＋GitHub push protection）。
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
